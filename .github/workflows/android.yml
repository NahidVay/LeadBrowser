name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Extract Project
        run: unzip -q LeadBrowser-fixed-Launch.zip -d project

      - name: Find Project Folder
        id: project
        run: |
          PROJECT_DIR=$(find project -maxdepth 2 -name "gradlew" -exec dirname {} \; | head -n 1)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Grant Execute Permission
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LeadBrowser-Debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          
