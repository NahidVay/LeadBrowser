name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Find ZIP
        shell: bash
        run: |
          set -e

          ZIP_COUNT=$(find . -type f -iname "*.zip" \
            ! -path "./.git/*" \
            ! -path "./.github/*" | wc -l)

          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "❌ No ZIP file found."
            exit 1
          fi

          if [ "$ZIP_COUNT" -gt 1 ]; then
            echo "❌ Multiple ZIP files found:"
            find . -type f -iname "*.zip" \
              ! -path "./.git/*" \
              ! -path "./.github/*"
            exit 1
          fi

          ZIP_FILE=$(find . -type f -iname "*.zip" \
            ! -path "./.git/*" \
            ! -path "./.github/*" | head -n 1)

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "✅ ZIP Found: $ZIP_FILE"

      - name: Extract ZIP
        shell: bash
        run: |
          mkdir extracted
          unzip -q "$ZIP_FILE" -d extracted

      - name: Find Android Project
        shell: bash
        run: |
          set -e

          PROJECT_FILE=$(find extracted \
            -type f \
            \( -name "settings.gradle" -o -name "settings.gradle.kts" \) \
            | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ Android project not found."
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "✅ Project: $PROJECT_DIR"

      - name: Grant Execute Permission
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          chmod +x gradlew

      - name: Build Debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace

      - name: Find APK
        shell: bash
        run: |
          APK=$(find "$PROJECT_DIR" -type f -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "❌ APK not found."
            exit 1
          fi

          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "✅ APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LeadBrowser-APK
          path: ${{ env.APK_PATH }}
