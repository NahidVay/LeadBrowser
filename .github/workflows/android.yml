name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install unzip
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Find ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found!"
            exit 1
          fi

          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Found ZIP: $ZIP_FILE"

      - name: Extract ZIP
        run: |
          mkdir project
          unzip -q "$ZIP_FILE" -d project

      - name: Find Android Project
        run: |
          PROJECT_DIR=$(find project -name gradlew -exec dirname {} \; | head -n 1)

          if [ -z "$PROJECT_DIR" ]; then
            echo "gradlew not found!"
            find project
            exit 1
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project: $PROJECT_DIR"

      - name: Grant Permission
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Debug APK
        run: |
          cd "$PROJECT_DIR"
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Find APK
        run: |
          APK=$(find "$PROJECT_DIR" -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK not found!"
            exit 1
          fi

          echo "APK_FILE=$APK" >> $GITHUB_ENV
          echo "APK: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LeadBrowser-Debug
          path: ${{ env.APK_FILE }}
